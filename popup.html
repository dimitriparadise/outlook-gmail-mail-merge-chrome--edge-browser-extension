<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mail Merge Draft Helper</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main>
    <h1>Mail Merge Drafts</h1>
    <p class="hint">CSV columns should include at least <b>Name</b> and <b>Email</b>. Other columns can be used as variables like <code>{{Course}}</code>.</p>

    <label>1. Student CSV</label>
    <input id="csvFile" type="file" accept=".csv,text/csv" />
    <textarea id="csvText" placeholder="Or paste CSV here:
Name,Email,Course,Section,DueDate
John,john@example.com,ISOM 210,A,Friday"></textarea>

    <section class="variable-panel">
      <label>Template variables</label>
      <p class="hint">Click Generate Drafts after uploading or pasting CSV data to load variables.</p>
      <div id="variableButtons" class="variable-buttons"></div>
    </section>

    <label>2. Compose mode</label>
    <select id="composeMode">
      <option value="outlook">Outlook Mode</option>
      <option value="gmail">Gmail Mode</option>
    </select>
    <div style="margin-top: 8px; margin-bottom: 4px;">
      <label style="display: inline-flex; align-items: center; font-weight: normal; font-size: 0.9em; cursor: pointer;">
        <input type="checkbox" id="autoSend" style="margin-right: 6px; width: auto;">
        Auto-Send Drafts (Experimental)
      </label>
    </div>
    <p id="composeModeHint" class="hint mode-hint"></p>

    <label>3. Subject template</label>
    <input id="subject" value="Reminder for {{Course}}" />

    <label>4. Optional CC</label>
    <input id="cc" placeholder="Optional: email@example.com or {{CcEmail}}" />

    <label>5. Optional BCC</label>
    <input id="bcc" placeholder="Optional: email@example.com or {{BccEmail}}" />
    <p id="copyRecipientHint" class="hint mailto-hint"></p>

    <label>6. Body template</label>
    <textarea id="body">Hi {{Name}},

This is a quick reminder about {{Course}}.

Best,
Professor He</textarea>

    <div class="row">
      <button id="loadBtn">Generate Drafts</button>
    </div>

    <section id="status"></section>
    <section id="preview"></section>
    <div class="hidden preview-controls" id="previewControls">
      <button id="previewPrevBtn" type="button" class="secondary">Previous Preview</button>
      <span id="previewCounter"></span>
      <button id="previewNextBtn" type="button" class="secondary">Next Preview</button>
    </div>

    <section class="hidden" id="sendControls">
      <button id="openNextBtn">Open Next Draft</button>
      <div class="range-controls">
        <label>
          From
          <input id="rangeStart" type="number" min="1" />
        </label>
        <label>
          To
          <input id="rangeEnd" type="number" min="1" />
        </label>
        <button id="openRangeBtn">Open Range</button>
      </div>
    </section>
  </main>
  <script src="popup.js"></script>
</body>
</html>
